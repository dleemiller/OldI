# Phase A — pretrain on DeepScoresV2 remapped to 8-class layout.
# Only `staff` has annotations from DSv2; the 6 tune-book classes are
# unseen during this phase.

checkpoint: docling-project/docling-layout-heron

train_coco: data/deepscoresv2/model1_coco_train.json
train_images_root: data/deepscoresv2/ds2_dense/images
val_coco: data/deepscoresv2/model1_coco_test.json
val_images_root: data/deepscoresv2/ds2_dense/images

output_dir: training/checkpoints/pretrain_v1

# Training hparams
# Previous run (lr=1e-4/1e-5) peaked at epoch 17 (step 714) at val/mAP=0.879
# then degraded — by epoch 24 it was back down to 0.42. That's the classic
# "too-high LR past the good minimum" signature: the model reaches decent
# performance fast, then the remaining LR is big enough to kick it back out.
# Drop everything 10× so the peak is approached more smoothly and doesn't
# unwind in later epochs.
num_epochs: 30
learning_rate: 3.0e-5      # head LR — 3× faster than 1e-5, 3× slower than 1e-4
learning_rate_backbone: 3.0e-6  # backbone LR (keeps 10× split)
weight_decay: 1.0e-4
batch_size: 32             # heron at 640×640 + bf16 — 7GB VRAM at bs=16 → 95GB plenty
num_workers: 16            # 24-core host; augraphy is CPU-bound so saturate

# Heron was trained at 640×640; the processor downloaded from the checkpoint
# carries that size. We respect it — overriding makes the positional encoding
# invalid. Augmentation runs on the full-res image BEFORE the processor.

# Augmentation (applied before the HF image processor)
augmentation_phase: pretrain  # uses training.data.augment.pretrain_apply

# Backbone trains from step 0 but at 10× lower LR than the head
# (learning_rate_backbone=1e-5 vs learning_rate=1e-4). Earlier run showed
# that unfreezing at 1e-4 collapsed val/mAP 0.91 → 0.27 across epochs 9-16
# because the well-pretrained heron ResNet-101 got kicked off its minimum.
# We give it a gentler gradient so it adapts to DSv2's LilyPond renders
# without destroying heron's document-layout priors.
freeze_backbone_epochs: 0

# Evaluation cadence
eval_every_epochs: 1
save_every_epochs: 5
early_stop_patience: 5  # epochs without eval improvement
